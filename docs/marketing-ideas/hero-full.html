<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080, height=1920">
  <title>attunr — hero</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600;700&family=Outfit:wght@400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 1080px;
      height: 1920px;
      overflow: hidden;
      background: #080810;
      font-family: 'Outfit', sans-serif;
      color: #ebe8f5;
    }

    /* Rings */
    .ring {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      border-style: solid;
      border-width: 2px;
      pointer-events: none;
    }
    .ring-0 { width: 280px; height: 280px; border-color: rgba(139,92,246,0.65); }
    .ring-1 { width: 440px; height: 440px; border-color: rgba(99,102,241,0.48); }
    .ring-2 { width: 600px; height: 600px; border-color: rgba(59,130,246,0.32); }

    /* Static glow */
    .glow {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 900px;
      height: 900px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(139,92,246,0.15) 0%, transparent 70%);
      filter: blur(60px);
      pointer-events: none;
    }

    /* Content container */
    .content {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 20;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    /* Logo */
    .logo-text {
      font-family: 'Fraunces', serif;
      font-weight: 600;
      font-size: 30px;
      color: #ebe8f5;
      letter-spacing: 0.02em;
    }
    .logo-dots {
      display: flex;
      gap: 8px;
      margin-top: 8px;
      justify-content: center;
    }
    .logo-dot {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      opacity: 0.8;
    }

    /* Headline */
    .headline {
      font-family: 'Fraunces', serif;
      font-weight: 700;
      font-size: 72px;
      line-height: 1.1;
      letter-spacing: -0.02em;
      color: #ebe8f5;
      margin-top: 48px;
    }
    .headline-gradient {
      background: linear-gradient(to right, #a78bfa, #d8b4fe, #818cf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Subheading */
    .subheading {
      font-family: 'Outfit', sans-serif;
      font-size: 20px;
      color: rgba(255,255,255,0.6);
      line-height: 1.6;
      margin-top: 24px;
    }

    /* Button */
    .cta-button {
      margin-top: 48px;
      font-family: 'Fraunces', serif;
      font-size: 15px;
      letter-spacing: 0.08em;
      color: #e0d4ff;
      background: linear-gradient(135deg, rgba(139,92,246,0.25), rgba(99,102,241,0.15));
      border: 1px solid rgba(139,92,246,0.5);
      border-radius: 12px;
      padding: 0 56px;
      height: 56px;
      line-height: 56px;
      cursor: pointer;
      box-shadow: 0 0 30px rgba(139,92,246,0.2), 0 0 60px rgba(139,92,246,0.1), inset 0 1px 0 rgba(255,255,255,0.1);
    }

    /* Free text */
    .free-text {
      margin-top: 12px;
      font-family: 'Outfit', sans-serif;
      font-size: 14px;
      color: rgba(255,255,255,0.4);
    }
  </style>
</head>
<body>
  <!-- Glow layer -->
  <div class="glow"></div>

  <!-- Rings layer -->
  <div class="ring ring-0"></div>
  <div class="ring ring-1"></div>
  <div class="ring ring-2"></div>

  <!-- Content layer -->
  <div class="content">
    <div class="logo">
      <div class="logo-text">attunr</div>
      <div class="logo-dots">
        <div class="logo-dot" style="background:#ef4444"></div>
        <div class="logo-dot" style="background:#f97316"></div>
        <div class="logo-dot" style="background:#eab308"></div>
        <div class="logo-dot" style="background:#22c55e"></div>
        <div class="logo-dot" style="background:#3b82f6"></div>
        <div class="logo-dot" style="background:#6366f1"></div>
        <div class="logo-dot" style="background:#a855f7"></div>
      </div>
    </div>
    <h1 class="headline">Feel your voice<br><span class="headline-gradient">in your body</span></h1>
    <p class="subheading">You already know how this feels.<br>We just gave it a path.</p>
    <div class="cta-button">Try it now</div>
    <p class="free-text">free</p>
  </div>
</body>
</html>
