<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080, height=1920">
  <title>attunr — hero</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600&family=Outfit:wght@400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 1080px;
      height: 1920px;
      overflow: hidden;
      background: #080810;
      font-family: 'Outfit', sans-serif;
      color: #ebe8f5;
    }

    /* Rings */
    .ring {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      border-style: solid;
      border-width: 2px;
      pointer-events: none;
    }
    .ring-0 { width: 200px; height: 200px; border-color: rgba(239,68,68,0.65); }
    .ring-1 { width: 320px; height: 320px; border-color: rgba(249,115,22,0.55); }
    .ring-2 { width: 440px; height: 440px; border-color: rgba(234,179,8,0.47); }
    .ring-3 { width: 560px; height: 560px; border-color: rgba(34,197,94,0.40); }
    .ring-4 { width: 680px; height: 680px; border-color: rgba(59,130,246,0.33); }
    .ring-5 { width: 800px; height: 800px; border-color: rgba(99,102,241,0.26); }
    .ring-6 { width: 920px; height: 920px; border-color: rgba(168,85,247,0.20); }

    /* Static glow */
    .glow {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 900px;
      height: 900px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(139,92,246,0.15) 0%, transparent 70%);
      filter: blur(60px);
      pointer-events: none;
    }

    /* Content container */
    .content {
      position: relative;
      z-index: 20;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 1080px;
      height: 1920px;
      text-align: center;
    }

    /* Logo */
    .logo-text {
      font-family: 'Fraunces', serif;
      font-weight: 600;
      font-size: 30px;
      color: #ebe8f5;
      letter-spacing: 0.02em;
    }
    .logo-dots {
      display: flex;
      gap: 8px;
      margin-top: 8px;
      justify-content: center;
    }
    .logo-dot {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      opacity: 0.8;
    }

    /* Subheading */
    .subheading {
      font-family: 'Outfit', sans-serif;
      font-size: 20px;
      color: rgba(255,255,255,0.6);
      line-height: 1.6;
      margin-top: 48px;
    }
  </style>
</head>
<body>
  <!-- Glow layer -->
  <div class="glow"></div>

  <!-- Rings layer -->
  <div class="ring ring-0"></div>
  <div class="ring ring-1"></div>
  <div class="ring ring-2"></div>
  <div class="ring ring-3"></div>
  <div class="ring ring-4"></div>
  <div class="ring ring-5"></div>
  <div class="ring ring-6"></div>

  <!-- Content layer -->
  <div class="content">
    <div class="logo">
      <div class="logo-text">attunr</div>
      <div class="logo-dots">
        <div class="logo-dot" style="background:#ef4444"></div>
        <div class="logo-dot" style="background:#f97316"></div>
        <div class="logo-dot" style="background:#eab308"></div>
        <div class="logo-dot" style="background:#22c55e"></div>
        <div class="logo-dot" style="background:#3b82f6"></div>
        <div class="logo-dot" style="background:#6366f1"></div>
        <div class="logo-dot" style="background:#a855f7"></div>
      </div>
    </div>
    <p class="subheading">You already know how this feels.<br>We just gave it a path.</p>
  </div>
</body>
</html>
