<!DOCTYPE html>
<html>
<head>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: transparent; }
  .splash {
    --size: 2732px;
    width: var(--size);
    height: var(--size);
    background: #080810;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: calc(var(--size) * 0.015);
  }
  .text {
    color: #ffffff;
    font-family: 'Outfit', sans-serif;
    font-size: calc(var(--size) * 0.04);
    font-weight: 600;
    letter-spacing: -0.5px;
    line-height: 1;
  }
  .dots {
    display: flex;
    gap: calc(var(--size) * 0.007);
  }
  .dot {
    width: calc(var(--size) * 0.013);
    height: calc(var(--size) * 0.013);
    border-radius: 50%;
  }
</style>
</head>
<body>
  <div class="splash" id="splash">
    <span class="text">attunr</span>
    <div class="dots">
      <div class="dot" style="background: #ef4444"></div>
      <div class="dot" style="background: #f97316"></div>
      <div class="dot" style="background: #eab308"></div>
      <div class="dot" style="background: #22c55e"></div>
      <div class="dot" style="background: #3b82f6"></div>
      <div class="dot" style="background: #6366f1"></div>
      <div class="dot" style="background: #a855f7"></div>
    </div>
  </div>
</body>
</html>
